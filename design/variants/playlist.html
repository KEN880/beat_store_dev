<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KEN&amp;BAJ — Catalog / Playlist</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.47.0/iconfont/tabler-icons.min.css">
<style>
:root{
  --bg:#0a0a0c; --bg2:#0e0e12; --panel:#131319; --row:#101015; --rowh:#191922;
  --line:rgba(255,255,255,.07); --line2:rgba(255,255,255,.12);
  --ink:#ece9e4; --mut:#8a8a96; --dim:#5c5c68;
  --acc:#ff5a3c; --acc2:#ffb03c;
  --mono:'JetBrains Mono',monospace; --sans:'Space Grotesk',sans-serif;
  --pad:clamp(16px,4vw,42px);
}
*{box-sizing:border-box;margin:0;padding:0;}
html{-webkit-text-size-adjust:100%;}
body{background:var(--bg);color:var(--ink);font-family:var(--sans);
  -webkit-font-smoothing:antialiased;padding-bottom:84px;min-height:100vh;
  background-image:radial-gradient(120% 80% at 80% -10%,rgba(255,90,60,.10),transparent 55%),
                   radial-gradient(90% 60% at 0% 0%,rgba(124,92,255,.07),transparent 50%);}
button{font-family:inherit;cursor:pointer;color:inherit;background:none;border:none;}
.mono{font-family:var(--mono);}

/* ===== top bar ===== */
.top{position:sticky;top:0;z-index:40;display:flex;align-items:center;gap:22px;
  padding:14px var(--pad);background:rgba(10,10,12,.78);backdrop-filter:blur(14px);
  border-bottom:1px solid var(--line);}
.logo{font-weight:700;font-size:17px;letter-spacing:-.01em;display:flex;align-items:center;gap:8px;white-space:nowrap;}
.logo .dot{width:8px;height:8px;border-radius:50%;background:var(--acc);box-shadow:0 0 12px var(--acc);}
.logo b{color:var(--acc);font-weight:700;}
.nav{display:flex;gap:20px;margin-left:8px;}
.nav a{font-size:13.5px;color:var(--mut);text-decoration:none;transition:color .2s;}
.nav a:hover,.nav a.on{color:var(--ink);}
.search{margin-left:auto;display:flex;align-items:center;gap:8px;background:var(--panel);
  border:1px solid var(--line);border-radius:10px;padding:8px 12px;min-width:210px;transition:border-color .2s;}
.search:focus-within{border-color:var(--line2);}
.search i{color:var(--dim);font-size:16px;}
.search input{background:none;border:none;outline:none;color:var(--ink);font-family:var(--mono);
  font-size:12.5px;width:100%;letter-spacing:.02em;}
.search input::placeholder{color:var(--dim);}
.cart{display:flex;align-items:center;gap:7px;background:var(--acc);color:#160b08;
  font-weight:600;font-size:13px;padding:9px 14px;border-radius:10px;white-space:nowrap;transition:transform .12s,filter .2s;}
.cart:hover{filter:brightness(1.08);} .cart:active{transform:scale(.96);}
.cart i{font-size:16px;}

/* ===== header / controls ===== */
.head{padding:30px var(--pad) 8px;display:flex;align-items:flex-end;justify-content:space-between;gap:20px;flex-wrap:wrap;}
.head h1{font-size:clamp(26px,4vw,44px);font-weight:700;letter-spacing:-.03em;line-height:1;}
.head .sub{font-family:var(--mono);font-size:12px;color:var(--mut);letter-spacing:.08em;text-transform:uppercase;margin-top:10px;}
.head .sub b{color:var(--acc);font-weight:500;}
.playall{display:flex;align-items:center;gap:9px;border:1px solid var(--line2);border-radius:999px;
  padding:9px 16px 9px 12px;font-size:13.5px;font-weight:500;transition:background .2s,border-color .2s;}
.playall:hover{background:var(--rowh);border-color:var(--acc);}
.playall .pc{width:24px;height:24px;border-radius:50%;background:var(--acc);color:#160b08;display:grid;place-items:center;font-size:13px;}

.controls{display:flex;align-items:center;gap:10px;padding:16px var(--pad) 6px;flex-wrap:wrap;}
.chips{display:flex;gap:8px;flex-wrap:wrap;}
.chip{font-family:var(--mono);font-size:11.5px;letter-spacing:.06em;text-transform:uppercase;
  color:var(--mut);border:1px solid var(--line);border-radius:999px;padding:7px 13px;transition:.18s;}
.chip:hover{color:var(--ink);border-color:var(--line2);}
.chip.on{color:#160b08;background:var(--ink);border-color:var(--ink);font-weight:500;}
.sort{margin-left:auto;display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:11.5px;color:var(--dim);text-transform:uppercase;letter-spacing:.06em;}
.sort select{font-family:var(--mono);font-size:11.5px;background:var(--panel);color:var(--ink);
  border:1px solid var(--line);border-radius:8px;padding:6px 8px;outline:none;text-transform:uppercase;letter-spacing:.04em;}

/* ===== list ===== */
.list{padding:6px var(--pad) 40px;}
.lhead{display:grid;grid-template-columns:38px 46px minmax(150px,1.4fr) minmax(120px,2fr) 62px 52px 150px 52px 108px;
  gap:14px;align-items:center;padding:8px 12px;font-family:var(--mono);font-size:10.5px;letter-spacing:.1em;
  text-transform:uppercase;color:var(--dim);border-bottom:1px solid var(--line);}
.lhead .r{text-align:right;}
.rows{margin-top:4px;}
.rw{display:grid;grid-template-columns:38px 46px minmax(150px,1.4fr) minmax(120px,2fr) 62px 52px 150px 52px 108px;
  gap:14px;align-items:center;padding:10px 12px;border-radius:12px;position:relative;
  transition:background .15s;cursor:default;}
.rw:hover{background:var(--rowh);}
.rw.playing{background:linear-gradient(90deg,rgba(255,90,60,.14),rgba(255,90,60,.03));}
.rw.playing::before{content:"";position:absolute;left:0;top:8px;bottom:8px;width:3px;border-radius:3px;background:var(--acc);}

.idx{font-family:var(--mono);font-size:13px;color:var(--dim);text-align:center;}
.rw:hover .idx,.rw.playing .idx{display:none;}
.pbtn{width:38px;height:38px;margin:0 auto;display:none;place-items:center;color:var(--ink);font-size:17px;}
.rw:hover .pbtn,.rw.playing .pbtn{display:grid;}
.rw:hover .num-wrap{}
.numcell{position:relative;display:grid;place-items:center;}
.numcell .pbtn{position:absolute;inset:0;}

.art{width:46px;height:46px;border-radius:8px;display:grid;place-items:center;font-family:var(--mono);
  font-weight:700;font-size:15px;color:#0c0c0c;position:relative;overflow:hidden;}
.art span{position:relative;z-index:1;mix-blend-mode:overlay;color:#fff;opacity:.9;}

.meta .t{font-weight:600;font-size:15px;letter-spacing:-.01em;display:flex;align-items:center;gap:8px;}
.meta .t .exc{color:var(--acc);font-size:11px;}
.meta .tags{display:flex;gap:6px;margin-top:4px;flex-wrap:wrap;}
.tag{font-family:var(--mono);font-size:10px;color:var(--mut);background:var(--panel);border:1px solid var(--line);
  border-radius:5px;padding:2px 6px;letter-spacing:.02em;}

/* waveform */
.wave{display:flex;align-items:center;gap:2px;height:34px;overflow:hidden;}
.wave i{flex:1;min-width:2px;background:var(--dim);border-radius:2px;opacity:.5;transition:background .2s,opacity .2s;}
.rw:hover .wave i{opacity:.7;}
.rw.playing .wave i.on{background:var(--acc);opacity:1;}
.rw.playing .wave i{opacity:.85;}

.bpm,.key{font-family:var(--mono);font-size:13px;color:var(--mut);}
.bpm b{color:var(--ink);font-weight:500;} .key{color:var(--ink);}
.dur{font-family:var(--mono);font-size:12.5px;color:var(--dim);text-align:right;}

.buy{display:flex;align-items:center;justify-content:flex-end;gap:8px;}
.price{font-family:var(--mono);font-size:14px;font-weight:500;color:var(--ink);}
.lic{display:flex;align-items:center;gap:5px;border:1px solid var(--line2);border-radius:8px;padding:7px 10px;
  font-size:12px;color:var(--mut);transition:.18s;white-space:nowrap;}
.lic:hover{border-color:var(--acc);color:var(--ink);}
.lic i{font-size:14px;}
.addcell{display:flex;justify-content:flex-end;}
.add{width:38px;height:38px;border:1px solid var(--line2);border-radius:9px;display:grid;place-items:center;
  color:var(--mut);font-size:17px;transition:.16s;}
.add:hover{border-color:var(--acc);color:var(--acc);background:rgba(255,90,60,.08);}
.add.in{background:var(--acc);border-color:var(--acc);color:#160b08;}

.empty{padding:60px;text-align:center;color:var(--dim);font-family:var(--mono);font-size:13px;display:none;}

/* ===== bottom player ===== */
.player{position:fixed;left:0;right:0;bottom:0;z-index:50;display:flex;align-items:center;gap:16px;
  padding:12px var(--pad);background:rgba(14,14,18,.92);backdrop-filter:blur(16px);border-top:1px solid var(--line2);}
.player .now{display:flex;align-items:center;gap:12px;min-width:0;width:280px;}
.player .now .art{width:44px;height:44px;flex-shrink:0;}
.player .now .txt{min-width:0;}
.player .now .nt{font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.player .now .nm{font-family:var(--mono);font-size:11px;color:var(--mut);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.player .ctr{display:flex;align-items:center;gap:14px;}
.player .ctr button{color:var(--mut);font-size:18px;transition:color .15s,transform .12s;}
.player .ctr button:hover{color:var(--ink);}
.player .pp{width:42px;height:42px;border-radius:50%;background:var(--ink);color:#0c0c0c;display:grid;place-items:center;font-size:19px;flex-shrink:0;}
.player.on .pp{background:var(--acc);color:#160b08;}
.player .pp:active{transform:scale(.93);}
.player .bar{flex:1;display:flex;align-items:center;gap:10px;min-width:0;}
.player .tm{font-family:var(--mono);font-size:11px;color:var(--dim);min-width:34px;}
.player .tr{flex:1;height:4px;background:rgba(255,255,255,.12);border-radius:3px;position:relative;cursor:pointer;}
.player .fl{position:absolute;left:0;top:0;bottom:0;width:0%;background:var(--acc);border-radius:3px;}
.player .fl::after{content:"";position:absolute;right:-5px;top:50%;transform:translateY(-50%);width:10px;height:10px;border-radius:50%;background:var(--ink);}
.player.on .fl::after{background:var(--acc);}
.player .vol{display:flex;align-items:center;gap:8px;width:120px;color:var(--mut);}
.player .vt{flex:1;height:4px;background:rgba(255,255,255,.12);border-radius:3px;position:relative;}
.player .vf{position:absolute;left:0;top:0;bottom:0;width:70%;background:var(--mut);border-radius:3px;}
.player .buyb{display:flex;align-items:center;gap:7px;background:var(--acc);color:#160b08;font-weight:600;font-size:13px;padding:9px 15px;border-radius:10px;white-space:nowrap;}

@media(max-width:1080px){
  .lhead,.rw{grid-template-columns:34px 42px minmax(120px,1.3fr) 56px 46px 120px 46px;}
  .lhead .h-wave,.wave,.lhead .h-dur,.dur{display:none;}
}
@media(max-width:720px){
  .nav,.player .vol,.player .ctr .sk{display:none;}
  .search{min-width:0;width:44px;padding:8px;} .search input{display:none;}
  .lhead,.rw{grid-template-columns:30px 40px 1fr 46px 64px;gap:10px;}
  .lhead .h-bpm,.bpm,.lhead .h-time,.dur,.lic,.lhead .h-lic{display:none;}
  .head h1{font-size:30px;} .player .now{width:auto;}
}
</style>
</head>
<body>

<div class="top">
  <div class="logo"><span class="dot"></span>KEN<b>&amp;</b>BAJ</div>
  <nav class="nav">
    <a href="#" class="on">Catalog</a><a href="#">Beats</a><a href="#">Sound kits</a><a href="#">About</a>
  </nav>
  <label class="search"><i class="ti ti-search"></i><input id="q" placeholder="search beats, tags, key…"></label>
  <button class="cart"><i class="ti ti-shopping-cart"></i> <span id="cartn">0</span></button>
</div>

<header class="head">
  <div>
    <h1>Catalog</h1>
    <div class="sub"><b id="count">10</b> beats · trap · emo · rage · melancholy · drill · r&amp;b</div>
  </div>
  <button class="playall" onclick="playIndex(0)"><span class="pc"><i class="ti ti-player-play-filled"></i></span> Play all</button>
</header>

<div class="controls">
  <div class="chips" id="chips">
    <button class="chip on" data-g="all">All</button>
    <button class="chip" data-g="trap">Trap</button>
    <button class="chip" data-g="emo">Emo</button>
    <button class="chip" data-g="rage">Rage</button>
    <button class="chip" data-g="melancholy">Melancholy</button>
    <button class="chip" data-g="drill">Drill</button>
    <button class="chip" data-g="rnb">R&amp;B</button>
  </div>
  <div class="sort">Sort
    <select id="sort">
      <option value="new">Newest</option>
      <option value="bpm">BPM ↑</option>
      <option value="price">Price ↑</option>
      <option value="az">A–Z</option>
    </select>
  </div>
</div>

<main class="list">
  <div class="lhead">
    <div>#</div><div></div><div>Title</div><div class="h-wave">Waveform</div>
    <div class="h-bpm">BPM</div><div>Key</div><div class="h-time r">Time · Mood</div>
    <div></div><div class="r h-lic">License</div>
  </div>
  <div class="rows" id="rows"></div>
  <div class="empty" id="empty">no beats match — clear filters</div>
</main>

<div class="player" id="player">
  <div class="now">
    <div class="art" id="pArt" style="background:#222"><span id="pArtT"></span></div>
    <div class="txt"><div class="nt" id="pTitle">Select a beat</div><div class="nm" id="pMeta">— · — · —</div></div>
  </div>
  <div class="ctr">
    <button class="sk" onclick="step(-1)"><i class="ti ti-player-skip-back-filled"></i></button>
    <button class="pp" id="pp" onclick="toggle()"><i class="ti ti-player-play-filled" id="ppI"></i></button>
    <button class="sk" onclick="step(1)"><i class="ti ti-player-skip-forward-filled"></i></button>
  </div>
  <div class="bar">
    <span class="tm" id="cur">0:00</span>
    <div class="tr" id="track"><div class="fl" id="fill"></div></div>
    <span class="tm" id="tot">0:00</span>
  </div>
  <div class="vol"><i class="ti ti-volume"></i><div class="vt"><div class="vf"></div></div></div>
  <button class="buyb"><i class="ti ti-shopping-cart"></i> License</button>
</div>

<script>
const BEATS=[
  {t:"Midnight",g:"trap",gl:"Trap · Dark",bpm:140,key:"F min",mood:"Menace",dur:"2:38",price:34.95,tags:["808","menace","dark"],c:["#e8503a","#7a1010"]},
  {t:"Saint",g:"melancholy",gl:"Melancholy",bpm:70,key:"Bb min",mood:"Late night",dur:"3:04",price:29.95,tags:["piano","sad","ambient"],c:["#7c5cff","#241452"]},
  {t:"Luv",g:"emo",gl:"Emo · Pluggnb",bpm:149,key:"C# min",mood:"Heartbreak",dur:"2:12",price:34.95,tags:["pluggnb","glitch","autotune"],c:["#ff3d9a","#18e0e0"]},
  {t:"Ash",g:"rage",gl:"Rage",bpm:160,key:"G min",mood:"Mosh",dur:"1:58",price:39.95,tags:["distorted","aggressive","808"],c:["#ff6a1f","#3a1408"]},
  {t:"Neon Alley",g:"trap",gl:"Trap · Dark",bpm:132,key:"A min",mood:"Nocturne",dur:"2:45",price:34.95,tags:["synth","night","hard"],c:["#19b0ff","#0a2a44"]},
  {t:"Grave",g:"drill",gl:"Drill · UK",bpm:142,key:"Eb min",mood:"Cold",dur:"2:20",price:34.95,tags:["drill","slide-808","dark"],c:["#8a94a6","#161a22"]},
  {t:"Silk",g:"rnb",gl:"R&B · Soul",bpm:88,key:"D min",mood:"Warm",dur:"3:16",price:29.95,tags:["keys","smooth","soul"],c:["#d9a441","#4a2f10"]},
  {t:"Payback",g:"rage",gl:"Rage",bpm:158,key:"F min",mood:"Hostile",dur:"2:04",price:39.95,tags:["distorted","hard","mosh"],c:["#ff2e2e","#3a0808"]},
  {t:"Halo",g:"melancholy",gl:"Melancholy",bpm:75,key:"G min",mood:"Grief",dur:"3:30",price:29.95,tags:["choir","ambient","sad"],c:["#a6b4ff","#1a2050"]},
  {t:"Dust",g:"trap",gl:"Trap · Soul",bpm:128,key:"C min",mood:"Mellow",dur:"2:52",price:34.95,tags:["vinyl","boom","mellow"],c:["#c98a5a","#3a2414"]},
];

// deterministic-ish waveform per beat
function wf(seed){let a=[],x=seed*9301+49297;for(let i=0;i<56;i++){x=(x*9301+49297)%233280;a.push(0.18+ (x/233280)*0.82);}return a;}
const NBARS=56;
let order=[...BEATS.keys()], curFilter="all", playing=-1, isPlaying=false, prog=0, timer=null, cart=new Set();

const rowsEl=document.getElementById('rows');
function durSec(d){let[m,s]=d.split(':').map(Number);return m*60+s;}
function fmt(sec){let m=Math.floor(sec/60),s=Math.floor(sec%60);return m+':'+String(s).padStart(2,'0');}

function render(){
  const q=document.getElementById('q').value.trim().toLowerCase();
  let list=order.filter(i=>{
    const b=BEATS[i];
    if(curFilter!=="all"&&b.g!==curFilter)return false;
    if(q){const hay=(b.t+' '+b.gl+' '+b.key+' '+b.mood+' '+b.tags.join(' ')).toLowerCase();if(!hay.includes(q))return false;}
    return true;
  });
  document.getElementById('count').textContent=list.length;
  document.getElementById('empty').style.display=list.length?'none':'block';
  rowsEl.innerHTML=list.map(i=>{
    const b=BEATS[i];const bars=wf(i+3);
    const pct= (playing===i)? prog : 0;
    const w=bars.map((h,k)=>`<i class="${(k/NBARS)<=pct?'on':''}" style="height:${Math.round(h*100)}%"></i>`).join('');
    return `<div class="rw ${playing===i?'playing':''}" data-i="${i}">
      <div class="numcell">
        <span class="idx">${String(i+1).padStart(2,'0')}</span>
        <button class="pbtn" onclick="playIndex(${i})"><i class="ti ti-player-${playing===i&&isPlaying?'pause':'play'}-filled"></i></button>
      </div>
      <div class="art" style="background:linear-gradient(135deg,${b.c[0]},${b.c[1]})"><span>${b.t[0]}</span></div>
      <div class="meta">
        <div class="t">${b.t} ${b.price>=39?'<span class="exc ti ti-flame"></span>':''}</div>
        <div class="tags">${b.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>
      </div>
      <div class="wave" onclick="playIndex(${i})">${w}</div>
      <div class="bpm"><b>${b.bpm}</b></div>
      <div class="key">${b.key}</div>
      <div class="dur">${b.dur} · ${b.mood}</div>
      <div class="addcell"><button class="add ${cart.has(i)?'in':''}" onclick="toggleCart(${i},event)"><i class="ti ti-${cart.has(i)?'check':'plus'}"></i></button></div>
      <div class="buy"><span class="price">$${b.price.toFixed(2)}</span><button class="lic"><i class="ti ti-license"></i> Lease <i class="ti ti-chevron-down" style="font-size:12px"></i></button></div>
    </div>`;
  }).join('');
}

function playIndex(i){
  if(playing===i){toggle();return;}
  playing=i;isPlaying=true;prog=0;
  const b=BEATS[i];
  document.getElementById('pTitle').textContent=b.t;
  document.getElementById('pMeta').textContent=`${b.gl} · ${b.bpm} BPM · ${b.key}`;
  document.getElementById('pArt').style.background=`linear-gradient(135deg,${b.c[0]},${b.c[1]})`;
  document.getElementById('pArtT').textContent=b.t[0];
  document.getElementById('tot').textContent=b.dur;
  document.getElementById('player').classList.add('on');
  document.getElementById('ppI').className='ti ti-player-pause-filled';
  render();startTimer();
}
function toggle(){if(playing<0){playIndex(order[0]);return;}isPlaying=!isPlaying;
  document.getElementById('ppI').className='ti ti-player-'+(isPlaying?'pause':'play')+'-filled';
  document.getElementById('player').classList.toggle('on',isPlaying);
  isPlaying?startTimer():clearInterval(timer);render();}
function step(d){const pos=order.indexOf(playing);let n=(pos+d+order.length)%order.length;playIndex(order[n]);}
function startTimer(){clearInterval(timer);const total=durSec(BEATS[playing].dur);
  timer=setInterval(()=>{if(!isPlaying)return;prog+=1/total/2;if(prog>=1){prog=0;step(1);return;}
    document.getElementById('fill').style.width=(prog*100)+'%';
    document.getElementById('cur').textContent=fmt(prog*total);
    // update playing row waveform
    const r=rowsEl.querySelector('.rw.playing .wave');
    if(r)[...r.children].forEach((el,k)=>el.classList.toggle('on',(k/NBARS)<=prog));
  },500);}
function toggleCart(i,e){e.stopPropagation();cart.has(i)?cart.delete(i):cart.add(i);
  document.getElementById('cartn').textContent=cart.size;render();}

document.getElementById('chips').addEventListener('click',e=>{const c=e.target.closest('.chip');if(!c)return;
  document.querySelectorAll('.chip').forEach(x=>x.classList.remove('on'));c.classList.add('on');curFilter=c.dataset.g;render();});
document.getElementById('q').addEventListener('input',render);
document.getElementById('sort').addEventListener('change',e=>{const v=e.target.value;
  order=[...BEATS.keys()];
  if(v==='bpm')order.sort((a,b)=>BEATS[a].bpm-BEATS[b].bpm);
  else if(v==='price')order.sort((a,b)=>BEATS[a].price-BEATS[b].price);
  else if(v==='az')order.sort((a,b)=>BEATS[a].t.localeCompare(BEATS[b].t));
  render();});
document.getElementById('track').addEventListener('click',e=>{if(playing<0)return;const r=e.currentTarget.getBoundingClientRect();
  prog=Math.min(1,Math.max(0,(e.clientX-r.left)/r.width));document.getElementById('fill').style.width=(prog*100)+'%';render();});

render();
</script>
