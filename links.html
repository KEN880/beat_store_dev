<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KEN&amp;BAJ — Links</title>
<meta name="description" content="KEN&BAJ — producer. Beats, socials & contact, all in one place.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo:wght@400;500;600;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/tabler-icons.min.css">
<style>
:root{
  --ink:#0b0b0a; --paper:#f5f2ec;
  --hair:rgba(245,242,236,.12); --hair2:rgba(245,242,236,.2);
  --mut:rgba(245,242,236,.5); --dim:rgba(245,242,236,.35);
  --acc:#b5121b; --acc-rgb:181,18,27;
  --g1-rgb:181,18,27; --g2-rgb:245,242,236;
  --av1:#b5121b; --av2:#3a0608; --av1-rgb:181,18,27;
  --mono:'Space Mono',monospace; --sans:'Archivo',sans-serif; --disp:'Anton',sans-serif;
  --ease:cubic-bezier(.16,1,.3,1);
  --r:4px; --ri:2px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{-webkit-text-size-adjust:100%;}
body{
  background:radial-gradient(130% 100% at 50% 35%, #1a1a18, #0b0b0a 60%) var(--ink);
  color:var(--paper);font-family:var(--sans);font-weight:400;
  -webkit-font-smoothing:antialiased;min-height:100svh;
  display:flex;flex-direction:column;align-items:center;
  padding:clamp(84px,13vh,120px) 18px 28px;
  overflow-x:hidden;position:relative;
}
a{color:inherit;text-decoration:none;}
/* film grain */
body::after{content:"";position:fixed;inset:0;pointer-events:none;z-index:90;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='180' height='180'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.82' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
  opacity:.06;mix-blend-mode:screen;}

/* ===== ambient glows — mechanism kept, near-invisible by default ===== */
.glow{position:fixed;border-radius:50%;filter:blur(90px);pointer-events:none;z-index:0;will-change:transform;}
.glow.g1{width:60vmax;height:60vmax;left:-22vmax;top:-20vmax;
  background:radial-gradient(circle,rgba(var(--g1-rgb),.05),transparent 62%);
  animation:drift1 46s ease-in-out infinite alternate;}
.glow.g2{width:55vmax;height:55vmax;right:-24vmax;bottom:-22vmax;
  background:radial-gradient(circle,rgba(var(--g2-rgb),.04),transparent 62%);
  animation:drift2 58s ease-in-out infinite alternate;}
.glow.g3{width:34vmax;height:34vmax;left:50%;top:58%;
  background:radial-gradient(circle,rgba(var(--g1-rgb),.03),transparent 65%);
  animation:drift3 70s ease-in-out infinite alternate;}
@keyframes drift1{from{transform:translate(0,0) scale(1);}to{transform:translate(9vmax,7vmax) scale(1.14);}}
@keyframes drift2{from{transform:translate(0,0) scale(1.1);}to{transform:translate(-8vmax,-9vmax) scale(.95);}}
@keyframes drift3{from{transform:translate(-50%,-50%) scale(1);}to{transform:translate(-38%,-62%) scale(1.22);}}
@media (prefers-reduced-motion:reduce){.glow{animation:none;}}

/* ===== top bar ===== */
.top{position:fixed;top:0;left:0;right:0;z-index:70;display:flex;align-items:center;justify-content:space-between;
  padding:18px clamp(18px,5vw,40px);}
.top .logo{font-family:var(--mono);font-weight:700;font-size:12px;letter-spacing:.18em;text-transform:uppercase;}
.top .tr{display:flex;gap:16px;font-size:13px;text-transform:lowercase;}
.top .tr a{color:var(--mut);transition:color .2s;}
.top .tr a:hover{color:var(--paper);}
.top .tr a[aria-current]{color:var(--paper);}

/* ===== column ===== */
.wrap{position:relative;z-index:1;width:100%;max-width:520px;display:flex;flex-direction:column;flex:1;}

/* ===== header ===== */
.hero{display:flex;flex-direction:column;align-items:center;text-align:center;margin-bottom:34px;}
.ava{
  width:96px;height:96px;border-radius:50%;position:relative;overflow:hidden;
  background:
    radial-gradient(circle at 30% 28%,rgba(245,242,236,.14),transparent 46%),
    linear-gradient(140deg,var(--av1) 0%,var(--av2) 100%);
  display:grid;place-items:center;
  box-shadow:0 0 0 1px var(--hair2),0 0 30px rgba(var(--av1-rgb),.12);
}
.ava span{font-family:var(--disp);font-weight:400;font-size:26px;letter-spacing:.02em;color:var(--paper);}
.ava img{width:100%;height:100%;object-fit:cover;display:block;}
.name{margin-top:20px;font-family:var(--disp);font-weight:400;font-size:34px;line-height:1;
  letter-spacing:.01em;text-transform:uppercase;display:flex;align-items:center;gap:10px;}
.name b{color:var(--acc);font-weight:400;}
.name .dot{width:9px;height:9px;border-radius:50%;background:var(--acc);
  animation:pulse 2.6s ease-in-out infinite;}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(var(--acc-rgb),.5);}50%{box-shadow:0 0 0 6px rgba(var(--acc-rgb),0);}}
@media (prefers-reduced-motion:reduce){.name .dot{animation:none;}}
.bio{margin-top:10px;font-size:14px;color:var(--mut);letter-spacing:.01em;text-transform:lowercase;}
.status{margin-top:14px;font-family:var(--mono);font-size:10px;letter-spacing:.28em;
  text-transform:uppercase;color:var(--mut);display:flex;align-items:center;gap:8px;}
.status i{color:var(--acc);font-size:12px;}

/* ===== link cards (base layout, style-agnostic) ===== */
.links{display:flex;flex-direction:column;gap:12px;}
.card{
  display:flex;align-items:center;gap:14px;
  border:1px solid var(--hair);border-radius:var(--r);
  padding:16px 18px;min-height:60px;
  transition:transform .16s var(--ease),background .2s,border-color .2s,color .2s;
  -webkit-tap-highlight-color:transparent;
}
.card:active{transform:translateY(0) scale(.985);}
.card .ic{
  width:38px;height:38px;flex:0 0 38px;border-radius:var(--ri);display:grid;place-items:center;
  background:transparent;border:1px solid var(--hair);
  font-size:19px;color:var(--mut);transition:color .2s,border-color .2s;
}
.card:hover .ic{color:var(--acc);border-color:rgba(var(--acc-rgb),.4);}
.card .lb{flex:1;min-width:0;font-size:15px;font-weight:600;letter-spacing:-.01em;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.card .ar{font-size:17px;color:var(--dim);transition:color .2s,transform .2s;}
.card:hover .ar{color:var(--paper);transform:translateX(3px);}

/* ---- card_style: panel (default — transparent, hairline) ---- */
.links.style-panel .card{background:transparent;}
.links.style-panel .card:hover{border-color:rgba(var(--acc-rgb),.6);transform:translateY(-2px);}

/* ---- card_style: outline (transparent, stronger hairline) ---- */
.links.style-outline .card{background:transparent;border-color:var(--hair2);}
.links.style-outline .card:hover{background:rgba(245,242,236,.03);border-color:rgba(var(--acc-rgb),.6);
  transform:translateY(-2px);}

/* ---- card_style: glass (translucent blur, neutral) ---- */
.links.style-glass .card{background:rgba(245,242,236,.05);border-color:var(--hair);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);}
.links.style-glass .card:hover{background:rgba(245,242,236,.08);border-color:rgba(var(--acc-rgb),.6);
  transform:translateY(-2px);}

/* ---- radius variants (cards + icon tiles) ---- */
.links.rad-rounded{--r:4px;--ri:2px;}
.links.rad-pill{--r:999px;--ri:50%;}
.links.rad-sharp{--r:0px;--ri:0px;}

/* ---- featured: paper-filled, inverted; hover = red fill + paper text ---- */
.links .card.featured{background:var(--paper);border-color:var(--paper);color:var(--ink);
  padding:19px 20px;min-height:66px;}
.links .card.featured .lb{font-size:16px;color:var(--ink);}
.links .card.featured .ic{background:transparent;border-color:rgba(11,11,10,.3);color:var(--ink);}
.links .card.featured .ar{color:rgba(11,11,10,.55);}
.links .card.featured:hover{background:var(--acc);border-color:var(--acc);color:var(--paper);
  transform:translateY(-2px);}
.links .card.featured:hover .lb{color:var(--paper);}
.links .card.featured:hover .ic{color:var(--paper);border-color:rgba(245,242,236,.4);}
.links .card.featured:hover .ar{color:var(--paper);}

/* ===== shimmer / states ===== */
.sk{height:72px;border-radius:var(--r);border:1px solid var(--hair);
  background:linear-gradient(100deg,rgba(245,242,236,.03) 38%,rgba(245,242,236,.08) 50%,rgba(245,242,236,.03) 62%);
  background-size:220% 100%;animation:shim 1.4s linear infinite;}
@keyframes shim{from{background-position:180% 0;}to{background-position:-60% 0;}}
.msg{font-family:var(--mono);font-size:12px;letter-spacing:.06em;color:var(--mut);
  text-align:center;padding:26px 10px;line-height:1.7;text-transform:lowercase;}
.msg.err{color:#d75a62;}
.msg .rt{display:inline-block;margin-top:12px;border:1px solid var(--hair2);border-radius:0;
  padding:12px 22px;color:var(--mut);cursor:pointer;transition:.2s;font-family:var(--mono);font-size:11px;
  letter-spacing:.14em;text-transform:uppercase;background:transparent;}
.msg .rt:hover{background:var(--paper);border-color:var(--paper);color:var(--ink);}

/* ===== THE FOOTER (compact) ===== */
.foot{margin-top:auto;padding:90px 0 36px;text-align:center;}
.foot .fgl{font-family:var(--mono);font-size:11px;letter-spacing:.32em;text-transform:uppercase;color:var(--mut);}
.foot .fmail{display:inline-block;position:relative;margin-top:12px;font-family:var(--disp);font-weight:400;
  text-transform:uppercase;font-size:clamp(22px,7vw,44px);line-height:.9;letter-spacing:.01em;color:var(--paper);}
.foot .fmail::after{content:"";position:absolute;left:0;right:0;bottom:2px;height:3px;background:var(--acc);
  transform:scaleX(0);transform-origin:left;transition:transform .4s var(--ease);}
.foot .fmail:hover::after{transform:scaleX(1);}
.foot .frow{margin-top:40px;border-top:1px solid var(--hair);padding-top:16px;
  display:flex;align-items:center;justify-content:space-between;gap:10px 18px;flex-wrap:wrap;}
.foot .cop{font-family:var(--mono);font-size:10px;letter-spacing:.14em;
  text-transform:uppercase;color:var(--dim);text-align:left;}
.foot .fl{display:flex;align-items:center;gap:10px;font-family:var(--mono);font-size:11px;
  letter-spacing:.06em;text-transform:lowercase;}
.foot .fl a{color:var(--mut);transition:color .2s;}
.foot .fl a:hover{color:var(--paper);}
.foot .fl .sep{color:var(--dim);}
.foot .fl a.adm{color:rgba(245,242,236,.25);}
.foot .fl a.adm:hover{color:var(--mut);}

@media (max-width:380px){
  .ava{width:84px;height:84px;}
  .name{font-size:28px;}
  .card{padding:14px 15px;}
  .links .card.featured{padding:16px 17px;}
  .top .tr{gap:12px;font-size:12px;}
}
</style>
</head>
<body>

<div class="glow g1"></div>
<div class="glow g2"></div>
<div class="glow g3"></div>

<nav class="top">
  <a href="/" class="logo">KEN&amp;BAJ</a>
  <div class="tr">
    <a href="/">home</a>
    <a href="/catalog.html">catalog</a>
    <a href="/links.html" aria-current="page">links</a>
    <a href="/tour.html">tour</a>
  </div>
</nav>

<div class="wrap">
  <header class="hero">
    <div class="ava" id="ava" aria-hidden="true"><span>K&amp;B</span></div>
    <h1 class="name" id="name">KEN<b>&amp;</b>BAJ <span class="dot"></span></h1>
    <p class="bio" id="bio">producer &middot; beats for the after-hours</p>
    <div class="status" id="status"><i class="ti ti-broadcast"></i> all links &middot; one place</div>
  </header>

  <main class="links style-panel rad-rounded" id="links" aria-label="Links">
    <div class="sk"></div>
    <div class="sk" style="animation-delay:.12s"></div>
    <div class="sk" style="animation-delay:.24s"></div>
    <div class="sk" style="animation-delay:.36s"></div>
  </main>

  <footer class="foot">
    <div class="fgl">inquiries</div>
    <a href="mailto:kenmusic888@gmail.com" class="fmail">kenmusic888@gmail.com</a>
    <div class="frow">
      <span class="cop" id="foot-cop">&copy; KEN&amp;BAJ &middot; cat. no. 001</span>
      <nav class="fl">
        <a href="/">home</a><span class="sep">&middot;</span>
        <a href="/catalog.html">catalog</a><span class="sep">&middot;</span>
        <a href="/tour.html">tour</a><span class="sep">&middot;</span>
        <a href="/admin.html" class="adm">admin</a>
      </nav>
    </div>
  </footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SB_URL='https://uarfrqrmksxdsuhivshu.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVhcmZycXJta3N4ZHN1aGl2c2h1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMxMjkyMjUsImV4cCI6MjA5ODcwNTIyNX0.NgVE-9xVLQsIAQspKhowfcxPNpCy-K5azNpwEdiUgF0';
const sb=window.supabase.createClient(SB_URL,SB_KEY);

/* ===== defaults (used when site_settings fetch fails / row missing) ===== */
const DEFAULTS={
  name:'KEN&BAJ',
  bio:'producer · beats for the after-hours',
  status:'ALL LINKS · ONE PLACE',
  avatar_url:null,
  monogram:'K&B',
  avatar_c1:'#b5121b',
  avatar_c2:'#3a0608',
  accent:'#b5121b',
  glow1:'#b5121b',
  glow2:'#f5f2ec',
  card_style:'panel',
  radius:'rounded',
  show_dot:true,
  footer:'© KEN&BAJ · cat. no. 001'
};

const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const box=document.getElementById('links');

/* only #hex colors may reach CSS */
const hexOk=c=>/^#(?:[0-9a-fA-F]{3}|[0-9a-fA-F]{4}|[0-9a-fA-F]{6}|[0-9a-fA-F]{8})$/.test(String(c||'').trim());
function rgbOf(hex){
  let h=String(hex).trim().slice(1);
  if(h.length===3||h.length===4)h=h.split('').map(x=>x+x).join('');
  return parseInt(h.slice(0,2),16)+','+parseInt(h.slice(2,4),16)+','+parseInt(h.slice(4,6),16);
}

/* deep-merge overrides onto defaults (null/undefined fall back) */
function merge(base,over){
  const out={...base};
  if(over&&typeof over==='object'&&!Array.isArray(over)){
    for(const k of Object.keys(over)){
      const v=over[k];
      if(v&&typeof v==='object'&&!Array.isArray(v)&&base[k]&&typeof base[k]==='object'&&!Array.isArray(base[k])){
        out[k]=merge(base[k],v);
      }else if(v!==null&&v!==undefined){
        out[k]=v;
      }
    }
  }
  return out;
}

/* only allow safe icon-name characters ("brand-youtube", "mail", ...) */
function iconClass(name){
  const n=String(name||'').trim().toLowerCase();
  return /^[a-z0-9-]+$/.test(n)?('ti ti-'+n):'ti ti-link';
}

/* classify href → target/rel; mailto & internal ("/...") open in same tab */
function linkAttrs(url){
  const u=String(url||'').trim();
  if(/^mailto:/i.test(u)||/^tel:/i.test(u)) return {href:u,ext:false};
  if(u.startsWith('/'))                     return {href:u,ext:false};
  if(/^https?:\/\//i.test(u))               return {href:u,ext:true};
  return null; // reject javascript:, data:, and anything else
}

/* "KEN&BAJ" → accent the ampersand, like the original wordmark */
function nameHTML(name){
  const n=String(name||'');
  const i=n.indexOf('&');
  if(i>-1) return esc(n.slice(0,i))+'<b>&amp;</b>'+esc(n.slice(i+1));
  return esc(n);
}

function applySettings(s){
  const rt=document.documentElement.style;
  if(hexOk(s.accent)){rt.setProperty('--acc',s.accent.trim());rt.setProperty('--acc-rgb',rgbOf(s.accent));}
  if(hexOk(s.glow1)) rt.setProperty('--g1-rgb',rgbOf(s.glow1));
  if(hexOk(s.glow2)) rt.setProperty('--g2-rgb',rgbOf(s.glow2));
  if(hexOk(s.avatar_c1)){rt.setProperty('--av1',s.avatar_c1.trim());rt.setProperty('--av1-rgb',rgbOf(s.avatar_c1));}
  if(hexOk(s.avatar_c2)) rt.setProperty('--av2',s.avatar_c2.trim());

  /* avatar: image overrides monogram disc */
  const ava=document.getElementById('ava');
  const showMono=()=>{ava.innerHTML='<span>'+esc(s.monogram||'')+'</span>';};
  const au=String(s.avatar_url||'').trim();
  if(/^https?:\/\//i.test(au)){
    ava.innerHTML='<img src="'+esc(au)+'" alt="" loading="lazy">';
    const im=ava.querySelector('img');
    if(im) im.onerror=showMono;
  }else{
    showMono();
  }

  /* texts + pulsing dot */
  document.getElementById('name').innerHTML=
    nameHTML(s.name)+(s.show_dot?' <span class="dot"></span>':'');
  document.getElementById('bio').textContent=String(s.bio||'');
  const st=document.getElementById('status');
  if(s.status){st.style.display='';st.innerHTML='<i class="ti ti-broadcast"></i> '+esc(s.status);}
  else{st.style.display='none';}
  document.getElementById('foot-cop').textContent=String(s.footer||'');

  /* card style + radius via container classes (whitelisted) */
  const cs=['panel','outline','glass'].includes(s.card_style)?s.card_style:'panel';
  const rd=['rounded','pill','sharp'].includes(s.radius)?s.radius:'rounded';
  box.className='links style-'+cs+' rad-'+rd;

  /* title follows a custom name; default stays "KEN&BAJ — Links" */
  document.title=(s.name&&s.name!=='KEN&BAJ')?(s.name+' — Links'):'KEN&BAJ — Links';
}

function render(rows){
  const cards=rows.map(r=>{
    const a=linkAttrs(r.url);
    if(!a) return '';
    const tgt=a.ext?' target="_blank" rel="noopener noreferrer"':'';
    const cls=r.featured?'card featured':'card';
    return `<a class="${cls}" href="${esc(a.href)}"${tgt}>
      <span class="ic"><i class="${esc(iconClass(r.icon))}"></i></span>
      <span class="lb">${esc(r.label)}</span>
      <i class="ar ti ti-arrow-up-right"></i>
    </a>`;
  }).filter(Boolean);
  box.innerHTML=cards.length?cards.join('')
    :'<div class="msg">nothing here yet &middot; check back soon</div>';
}

function fail(){
  box.innerHTML=`<div class="msg err">couldn&#39;t load links &middot; signal lost
    <br><button class="rt" onclick="load()">retry</button></div>`;
}

async function load(){
  box.innerHTML='<div class="sk"></div><div class="sk" style="animation-delay:.12s"></div><div class="sk" style="animation-delay:.24s"></div><div class="sk" style="animation-delay:.36s"></div>';
  let settings=DEFAULTS;
  try{
    const [sRes,lRes]=await Promise.all([
      sb.from('site_settings').select('settings').eq('id',1).maybeSingle(),
      sb.from('links').select('label,url,icon,featured')
        .eq('published',true)
        .order('sort_order',{ascending:true})
    ]);
    if(!sRes.error&&sRes.data&&sRes.data.settings&&typeof sRes.data.settings==='object'){
      settings=merge(DEFAULTS,sRes.data.settings);
    }
    applySettings(settings);
    if(lRes.error) throw lRes.error;
    render(lRes.data||[]);
  }catch(e){
    applySettings(settings); // idempotent; guarantees defaults even on total failure
    fail();
  }
}
load();
</script>
</body>
</html>
